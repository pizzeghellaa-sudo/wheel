<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wheel of Fortune</title>
  <meta name="description" content="Spin the wheel and discover the winner!" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎡</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barriecito&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 900px;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    h1 {
      font-family: "Barriecito", system-ui;
      font-weight: 400;
      font-size: 3rem;
      letter-spacing: 2px;
      margin-bottom: 50px;
      /* color set randomly via JS on load */
    }

    /* ── Game row: wheel centered, winner panel on the right ── */
    .game {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      width: 100%;
      align-items: center;
    }

    /* ── Wheel column — sits in the center auto column ── */
    .wheel-section {
      grid-column: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Winner panel — anchored to the right of center ── */
    .winner-panel {
      grid-column: 3;
      justify-self: end;
    }

    /* ── Pointer triangle ── */
    .pointer {
      width: 24px;
      height: 20px;
      clip-path: polygon(50% 100%, 0% 0%, 100% 0%);
      margin-bottom: 4px;
      /* background-color set from CONFIG.pointerColor via JS */
    }

    canvas#wheel {
      display: block;
      max-width: 100%;
    }

    /* ── Spin button ── */
    #spinBtn {
      margin-top: 24px;
      padding: 12px 36px;
      border: none;
      border-radius: 999px;
      background: #7c3aed;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    #spinBtn:hover:not(:disabled) { background: #6d28d9; }
    #spinBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Winner panel ── */
    .winner-panel {
      width: 180px;
      min-height: 100px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2a2a4e;
      transition: background 0.4s;
      margin-left: 24px;
    }
    #winnerName {
      font-family: "Barriecito", system-ui;
      font-size: 1.8rem;
      font-weight: 400;
      transition: color 0.4s;
    }

    /* ── Winner overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: opacity 0.3s;
    }
    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .overlay-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      transform: scale(0);
    }
    .overlay-name {
      font-family: "Barriecito", system-ui;
      font-size: 4rem;
      font-weight: 400;
      padding: 16px 40px;
      border-radius: 16px;
      /* background and color set from winner segment via JS */
    }
    .overlay-label {
      font-size: 1.4rem;
      color: #fde68a;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .game {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      .winner-panel { grid-column: unset; justify-self: unset; margin-left: 0; width: 140px; min-height: 80px; }
      canvas#wheel { width: 300px; height: 300px; }
      #winnerName { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <div class="page">
    <h1 id="pageTitle">Wheel of Fortune</h1>
    <div class="game">

      <div class="wheel-section">
        <div class="pointer" id="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
        <button id="spinBtn">SPIN!</button>
      </div>

      <div class="winner-panel" id="winnerPanel">
        <span id="winnerName">?</span>
      </div>

    </div>
  </div>

  <!-- Winner overlay -->
  <div class="overlay" id="overlay">
    <div class="overlay-content" id="overlayContent">
      <div class="overlay-name" id="overlayName"></div>
      <div class="overlay-label">🏆 Winner!</div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    // ─────────────────────────────────────────────
    // CONFIG — edit this block to customise the game
    // ─────────────────────────────────────────────
    const CONFIG = {
      segments: [
        { label: 'Andy',    color: '#a78bfa', textColor: '#1a1a2e' },
        { label: 'Petro',   color: '#f9a8d4', textColor: '#1a1a2e' },
        { label: 'Jason',   color: '#fde68a', textColor: '#1a1a2e' },
        { label: 'Joao',    color: '#86efac', textColor: '#1a1a2e' },
        { label: 'Matheus', color: '#f87171', textColor: '#ffffff' },
        { label: 'Robson',  color: '#818cf8', textColor: '#ffffff' },
        { label: 'Marco',   color: '#f9a8d4', textColor: '#1a1a2e' },
        { label: 'Qazi',    color: '#d1a0a0', textColor: '#1a1a2e' },
        { label: 'Fellipe', color: '#84a98c', textColor: '#ffffff' },
      ],
      minSpins:      20,            // minimum full rotations before stopping
      maxSpins:      30,           // maximum full rotations
      spinDuration:  6,            // seconds for the spin animation
      pointerColor:  '#888888',    // color of the pointer triangle
      spinDirection: 'clockwise',  // 'clockwise' or 'counter-clockwise'
      tickSound:     true,         // play a ratchet tick sound while spinning
      tadaSound:     true,         // play a ta-da fanfare when the winner is revealed
    };
    // ─────────────────────────────────────────────

    // ── DOM refs ──
    const canvas   = document.getElementById('wheel');
    const ctx      = canvas.getContext('2d');
    const pointer  = document.getElementById('pointer');
    const spinBtn  = document.getElementById('spinBtn');
    const winnerPanel = document.getElementById('winnerPanel');
    const winnerName  = document.getElementById('winnerName');
    const overlay     = document.getElementById('overlay');
    const overlayContent = document.getElementById('overlayContent');
    const overlayName    = document.getElementById('overlayName');

    // Set page title with current date (M/D/YYYY)
    const _d = new Date();
    document.getElementById('pageTitle').textContent =
      `Wheel of Fortune of ${_d.getMonth() + 1}/${_d.getDate()}/${_d.getFullYear()}`;

    // Random bright clear color for the title (high saturation + lightness for dark bg)
    const _hue = Math.floor(Math.random() * 360);
    document.getElementById('pageTitle').style.color = `hsl(${_hue}, 90%, 72%)`;

    // Apply pointer color from CONFIG
    pointer.style.backgroundColor = CONFIG.pointerColor;

    // ── Shuffle segments (Fisher-Yates) so positions are random each load ──
    for (let i = CONFIG.segments.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [CONFIG.segments[i], CONFIG.segments[j]] = [CONFIG.segments[j], CONFIG.segments[i]];
    }

    // ── Wheel state ──
    let currentAngle = 0;

    // ── Helper: positive modulo ──
    function mod(a, n) { return ((a % n) + n) % n; }

    // ── Tick sound (Web Audio API) ──
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTick() {
      if (!audioCtx || !CONFIG.tickSound) return;
      const now = audioCtx.currentTime;

      // Short noise burst with exponential decay — sounds like a ratchet click
      const bufferSize = Math.floor(audioCtx.sampleRate * 0.015); // 15 ms
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.2));
      }

      const source = audioCtx.createBufferSource();
      source.buffer = buffer;

      // Bandpass filter shapes the noise into a crisp click
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 1000;
      filter.Q.value = 1.0;

      const gainNode = audioCtx.createGain();
      gainNode.gain.value = 0.4;

      source.connect(filter);
      filter.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      source.start(now);
    }

    function playTada() {
      if (!audioCtx || !CONFIG.tadaSound) return;
      const now = audioCtx.currentTime;

      function playNote(freq, startTime, duration, volume) {
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        // Attack → sustain → release envelope
        gain.gain.setValueAtTime(0, startTime);
        gain.gain.linearRampToValueAtTime(volume, startTime + 0.02);
        gain.gain.linearRampToValueAtTime(volume * 0.75, startTime + duration * 0.6);
        gain.gain.linearRampToValueAtTime(0, startTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(startTime);
        osc.stop(startTime + duration);
      }

      // "Ta" — quick G4
      playNote(392, now, 0.18, 0.35);
      // "Da!" — C5 + E5 + G5 chord (triumphant major triad)
      playNote(523, now + 0.18, 0.7, 0.35);
      playNote(659, now + 0.18, 0.7, 0.28);
      playNote(784, now + 0.18, 0.7, 0.22);
    }

    // ── Draw the wheel at a given rotation angle (radians) ──
    function drawWheel(angle) {
      const { segments } = CONFIG;
      const N = segments.length;
      const segAngle = (2 * Math.PI) / N;
      const cx = canvas.width  / 2;
      const cy = canvas.height / 2;
      const radius = Math.min(cx, cy) - 4;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      segments.forEach((seg, i) => {
        const startAngle = angle + i * segAngle - Math.PI / 2;
        const endAngle   = startAngle + segAngle;

        // Segment fill
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = seg.color;
        ctx.fill();

        // Thin white divider line
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Label text — rotated outward from center
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(startAngle + segAngle / 2);
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = seg.textColor;
        // Font size: fraction of arc width at 70% radius, clamped 10–24px
        const arcWidth = 2 * (radius * 0.7) * Math.sin(segAngle / 2);
        const fontSize = Math.max(12, Math.min(32, arcWidth * 0.58));
        ctx.font = `${fontSize}px 'Barriecito', system-ui`;
        ctx.fillText(seg.label, radius - 12, 0);
        ctx.restore();
      });

      // Center dot
      ctx.beginPath();
      ctx.arc(cx, cy, 8, 0, 2 * Math.PI);
      ctx.fillStyle = '#000000';
      ctx.fill();
    }

    // Draw initial static wheel — wait for fonts so Barriecito is ready on canvas
    document.fonts.ready.then(() => drawWheel(currentAngle));

    // ── Spin state ──
    let spinning = false;

    // ── Spin ──
    function spin() {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      initAudio(); // must be called from a user-gesture handler

      const { segments, minSpins, maxSpins, spinDuration, spinDirection } = CONFIG;
      const N         = segments.length;
      const segAngle  = (2 * Math.PI) / N;
      const direction = spinDirection === 'clockwise' ? 1 : -1;

      // Pick winner before animation starts
      const winnerIndex  = Math.floor(Math.random() * N);
      // Angle of winner segment's center in wheel's local frame (before rotation)
      const winnerCenter = winnerIndex * segAngle + segAngle / 2;

      // The wheel draws segment i centered at: angle + i*segAngle - π/2 + segAngle/2
      // Pointer is at 12 o'clock = canvas angle -π/2. For winner to land there:
      //   angle + winnerCenter - π/2 = -π/2  →  angle = -winnerCenter
      const finalAngleBase = -winnerCenter;

      // Random number of full rotations in [minSpins, maxSpins)
      const fullSpins = Math.floor(minSpins + Math.random() * (maxSpins - minSpins));

      // Extra rotation beyond full spins to land exactly on winner
      let extra;
      if (direction === 1) {
        // Clockwise (positive): extra must be in [0, 2π)
        extra = mod(finalAngleBase - mod(currentAngle, 2 * Math.PI), 2 * Math.PI);
      } else {
        // Counter-clockwise (negative): extra must be in [0, 2π), then subtract
        extra = mod(mod(currentAngle, 2 * Math.PI) - finalAngleBase, 2 * Math.PI);
      }

      const targetAngle = currentAngle + direction * (fullSpins * 2 * Math.PI) + direction * extra;

      // GSAP tween via proxy object
      const proxy = { val: currentAngle };
      let lastSegIndex = -1;
      gsap.to(proxy, {
        val:      targetAngle,
        duration: spinDuration,
        ease:     'power4.out',
        onUpdate() {
          currentAngle = proxy.val;
          drawWheel(currentAngle);
          // Fire a tick each time the angle crosses a segment boundary
          const segIdx = Math.floor(mod(currentAngle, 2 * Math.PI) / segAngle);
          if (segIdx !== lastSegIndex) {
            lastSegIndex = segIdx;
            playTick();
          }
        },
        onComplete() {
          currentAngle = targetAngle;
          spinning = false;
          spinBtn.textContent = 'RESET';
          spinBtn.dataset.mode = 'reset';
          spinBtn.disabled = false;
          showWinner(winnerIndex);
        },
      });
    }

    spinBtn.addEventListener('click', () => {
      if (spinBtn.dataset.mode === 'reset') {
        location.reload();
      } else {
        spin();
      }
    });

    // ── Winner effect ──
    let dismissTimer = null;

    function showWinner(index) {
      const seg = CONFIG.segments[index];

      // 1. Update winner panel (right side box)
      winnerPanel.style.background = seg.color;
      winnerName.style.color = seg.textColor;
      winnerName.textContent = seg.label;

      // 2. Populate overlay name card with segment colors
      overlayName.textContent = seg.label;
      overlayName.style.background = seg.color;
      overlayName.style.color = seg.textColor;

      // 3. Fade in overlay and play fanfare
      overlay.classList.add('active');
      playTada();

      // 4. Zoom in overlay content with GSAP Back.easeOut
      gsap.fromTo(
        overlayContent,
        { scale: 0, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.6, ease: 'back.out(1.7)' }
      );

      // 5. Auto-dismiss after 4 seconds
      if (dismissTimer) clearTimeout(dismissTimer);
      dismissTimer = setTimeout(dismissOverlay, 6000);
    }

    function dismissOverlay() {
      if (dismissTimer) { clearTimeout(dismissTimer); dismissTimer = null; }
      gsap.killTweensOf(overlayContent);
      gsap.to(overlayContent, {
        scale: 0,
        opacity: 0,
        duration: 0.3,
        ease: 'power2.in',
        onComplete() {
          overlay.classList.remove('active');
          // Reset scale for next time
          gsap.set(overlayContent, { scale: 0, opacity: 0 });
        },
      });
    }

    overlay.addEventListener('click', dismissOverlay);
  </script>
</body>
</html>
